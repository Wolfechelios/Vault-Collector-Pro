<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Collector's Catalogue</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0908;--bg2:#111010;--surface:#181716;--surface2:#1F1E1C;--border:#2E2B28;--border-l:#3A3632;--fg:#EAE6DF;--fg-m:#8A857E;--fg-d:#5A5650;--fg-dd:#3A3835;--accent:#C9A84C;--accent-h:#DDB94E;--accent-dim:rgba(201,168,76,.1);--accent-glow:rgba(201,168,76,.22);--danger:#C44B3F;--danger-dim:rgba(196,75,63,.12);--success:#5A9E6F;--success-dim:rgba(90,158,111,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);overflow:hidden;height:100vh}
h1,h2,h3,h4{font-family:'Playfair Display',serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.3}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:256px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sb-brand{padding:22px 18px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-bi{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#A08030);display:flex;align-items:center;justify-content:center;font-size:15px;color:#0A0908;font-weight:800;font-family:'Playfair Display',serif}
.sb-brand h1{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-.3px}
.sb-brand p{font-size:10.5px;color:var(--fg-d);margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:8px}
.sb-sl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.6px;color:var(--fg-dd);padding:14px 10px 5px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;transition:color .2s}
.sb-sl:hover{color:var(--fg-m)}
.sb-sl i{font-size:8px;transition:transform .2s}
.sb-sec.col .sb-sl i{transform:rotate(-90deg)}
.sb-si{overflow:hidden;transition:max-height .3s ease}
.sb-sec.col .sb-si{max-height:0!important}
.sb-btn{display:flex;align-items:center;gap:11px;width:100%;padding:8px 12px;border:none;background:0 0;color:var(--fg-m);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:7px;cursor:pointer;transition:all .15s;text-align:left;position:relative}
.sb-btn:hover{background:var(--surface);color:var(--fg)}
.sb-btn.active{background:var(--accent-dim);color:var(--accent)}
.sb-btn.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--accent);border-radius:0 3px 3px 0}
.sb-btn .ic{width:18px;text-align:center;font-size:13px;flex-shrink:0}
.sb-btn .ct{margin-left:auto;font-size:10.5px;font-weight:600;background:var(--surface2);color:var(--fg-d);padding:1px 7px;border-radius:9px;min-width:20px;text-align:center}
.sb-btn.active .ct{background:var(--accent-glow);color:var(--accent)}
.sb-foot{padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:6px}
.sb-foot button{flex:1;padding:7px;border:1px solid var(--border);background:var(--surface);color:var(--fg-d);border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all .2s}
.sb-foot button:hover{border-color:var(--accent);color:var(--accent)}
.sb-sc{padding:10px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--fg-dd);line-height:1.8}
.sb-sc kbd{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0 5px;font-size:9.5px;color:var(--fg-m)}
#main{margin-left:256px;height:100vh;overflow-y:auto;position:relative;z-index:1;transition:margin-left .3s cubic-bezier(.4,0,.2,1)}
#sb-bd{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;display:none;backdrop-filter:blur(2px)}
#sb-bd.show{display:block}
#ham{display:none;position:fixed;top:14px;left:14px;z-index:150;width:40px;height:40px;border-radius:9px;background:var(--surface);border:1px solid var(--border);color:var(--fg);font-size:16px;cursor:pointer;transition:all .2s;align-items:center;justify-content:center}
#ham:hover{border-color:var(--accent);color:var(--accent)}
.vh{padding:28px 36px 0;position:sticky;top:0;z-index:20;background:linear-gradient(to bottom,var(--bg) 65%,transparent);padding-bottom:16px}
.vh-cat{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.vh-title{font-size:30px;font-weight:800;line-height:1.15}
.vh-sub{color:var(--fg-m);font-size:13.5px;margin-top:5px}
.vh-acts{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;align-items:center}
.btn-p{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;background:var(--accent);color:#0A0908;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-p:hover{background:var(--accent-h);transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,76,.25)}
.btn-s{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;background:var(--surface);color:var(--fg-m);border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-s:hover{border-color:var(--fg-d);color:var(--fg)}
.btn-d{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;background:var(--danger-dim);color:var(--danger);border:1px solid rgba(196,75,63,.25);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-d:hover{background:rgba(196,75,63,.22)}
.sbox{display:flex;align-items:center;gap:8px;padding:0 12px;background:var(--surface);border:1px solid var(--border);border-radius:7px;margin-left:auto;min-width:200px;transition:border-color .2s}
.sbox:focus-within{border-color:var(--accent)}
.sbox i{color:var(--fg-d);font-size:12px}
.sbox input{border:none;background:0 0;color:var(--fg);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 0;outline:none;width:100%}
.sbox input::placeholder{color:var(--fg-d)}
.ssel{padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--fg-m);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;outline:none}
.ssel option{background:var(--surface2)}
.vc{padding:4px 36px 60px}
.fchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.fc{font-size:11.5px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--fg-m);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.fc:hover{border-color:var(--fg-d);color:var(--fg)}
.fc.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:24px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.sc-l{font-size:10.5px;color:var(--fg-d);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.sc-v{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-top:3px}
.sc-v.ac{color:var(--accent)}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.ic{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden;cursor:pointer;transition:all .22s;position:relative;opacity:0;transform:translateY(12px);animation:cIn .35s ease forwards}
.ic:hover{transform:translateY(-3px);box-shadow:0 10px 36px rgba(0,0,0,.45);border-color:rgba(255,255,255,.06)}
@keyframes cIn{to{opacity:1;transform:translateY(0)}}
.ic-img{width:100%;height:170px;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.ic-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.ic:hover .ic-img img{transform:scale(1.04)}
.ic-img .ph{font-size:32px;color:var(--fg-d);opacity:.3}
.ic-img .ct2{position:absolute;inset:0;opacity:.06;pointer-events:none}
.ic-body{padding:14px 16px 16px}
.ic-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;line-height:1.3;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ic-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.ic-tag{font-size:10.5px;padding:2px 7px;border-radius:4px;font-weight:500}
.ic-tag.d{background:var(--surface2);color:var(--fg-m)}
.ic-foot{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--border)}
.ic-price{font-size:14.5px;font-weight:700}
.ic-date{font-size:10.5px;color:var(--fg-d)}
.empty{text-align:center;padding:70px 20px}
.empty i{font-size:44px;color:var(--fg-dd);margin-bottom:18px;display:block}
.empty h3{font-size:18px;color:var(--fg-m);margin-bottom:6px}
.empty p{font-size:13.5px;color:var(--fg-d)}
.dw{display:flex;align-items:center;gap:28px}
.dl-row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--border)}
.dl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.dl-name{font-size:12.5px;color:var(--fg-m);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dl-val{font-size:12px;color:var(--fg);font-weight:600;flex-shrink:0}
.cb-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cb-label{font-size:12px;color:var(--fg-m);width:110px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cb-track{flex:1;height:22px;background:var(--surface2);border-radius:4px;overflow:hidden}
.cb-fill{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;padding-left:8px;font-size:10.5px;font-weight:600;color:#0A0908}
#mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:32px 16px}
#mo.open{display:flex}
.mb{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:680px;animation:mIn .22s ease-out;margin-bottom:32px}
@keyframes mIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:22px 26px 0}
.mt{font-size:20px;font-weight:700}
.mx{width:34px;height:34px;border-radius:7px;background:var(--surface);border:1px solid var(--border);color:var(--fg-m);cursor:pointer;font-size:13px;transition:all .2s;display:flex;align-items:center;justify-content:center}
.mx:hover{border-color:var(--danger);color:var(--danger)}
.mbody{padding:22px 26px 26px}
.fs-t{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--fg-d);margin:22px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.fs-t:first-child{margin-top:0}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg .full{grid-column:1/-1}
.fgi{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11.5px;font-weight:600;color:var(--fg-m)}
.fl .rq{color:var(--danger);margin-left:1px}
.fi,.fsel,.fta{padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--fg);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--accent)}
.fi::placeholder,.fta::placeholder{color:var(--fg-d)}
.fsel option{background:var(--surface2)}
.fta{resize:vertical;min-height:64px}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}
.img-dz{border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.img-dz:hover,.img-dz.dragover{border-color:var(--accent);background:var(--accent-dim)}
.img-dz input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-dz .dz-t{font-size:12px;color:var(--fg-m)}
.img-dz .dz-t i{display:block;font-size:20px;margin-bottom:6px;color:var(--fg-dd)}
.img-dz .dz-p{max-width:100%;max-height:120px;border-radius:4px;margin-top:8px}
.d-hero{width:calc(100% + 52px);margin:-22px -26px 18px;height:240px;background:var(--bg);overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.d-hero img{width:100%;height:100%;object-fit:cover}
.d-hero .ph{font-size:50px;color:var(--fg-d);opacity:.2}
.d-hero .co2{position:absolute;inset:0;opacity:.05}
.d-name{font-size:24px;font-weight:800;margin-bottom:3px}
.d-sub{color:var(--fg-m);font-size:13px;margin-bottom:18px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dfl{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--fg-d)}
.dfv{font-size:13.5px;color:var(--fg);margin-top:2px;word-break:break-word}
.dfv.ac{color:var(--accent);font-weight:700;font-size:17px}
.d-notes{margin-top:18px;padding:14px;background:var(--surface);border-radius:7px;font-size:13px;color:var(--fg-m);line-height:1.6}
.d-acts{display:flex;gap:8px;margin-top:22px;padding-top:18px;border-top:1px solid var(--border);flex-wrap:wrap}
.cf-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:380px;padding:28px;text-align:center;animation:mIn .22s ease-out}
.cf-box i{font-size:34px;color:var(--danger);margin-bottom:14px}
.cf-box h3{font-size:19px;margin-bottom:6px}
.cf-box p{font-size:13.5px;color:var(--fg-m);margin-bottom:22px;line-height:1.5}
.cf-acts{display:flex;gap:8px;justify-content:center}
#tc{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:6px}
.toast{padding:12px 18px;border-radius:9px;font-size:13px;font-weight:500;animation:tIn .25s ease-out;display:flex;align-items:center;gap:9px;box-shadow:0 6px 24px rgba(0,0,0,.5)}
.toast.success{background:var(--success-dim);border:1px solid rgba(90,158,111,.3);color:var(--success)}
.toast.error{background:var(--danger-dim);border:1px solid rgba(196,75,63,.3);color:var(--danger)}
.toast.info{background:var(--accent-dim);border:1px solid var(--accent-glow);color:var(--accent)}
@keyframes tIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
@media(max-width:768px){#sidebar{transform:translateX(-256px)}#sidebar.open{transform:translateX(0)}#main{margin-left:0!important}#ham{display:flex}.vh{padding:66px 18px 14px}.vc{padding:4px 18px 50px}.vh-acts{flex-direction:column}.sbox{margin-left:0;min-width:100%}.fg,.dg{grid-template-columns:1fr}.ig{grid-template-columns:1fr}.sr{grid-template-columns:1fr 1fr}.dw{flex-direction:column}.d-acts{flex-direction:column}.d-acts .btn-d{margin-left:0}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<button id="ham" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
<div id="sb-bd"></div>
<aside id="sidebar"><div class="sb-brand"><div class="sb-bi">V</div><div><h1>Vault</h1><p>Collector Catalogue</p></div></div><nav class="sb-nav" id="sb-nav"></nav><div class="sb-foot"><button onclick="expD()"><i class="fas fa-download"></i> Export</button><button onclick="document.getElementById('imp-f').click()"><i class="fas fa-upload"></i> Import</button><input type="file" id="imp-f" accept=".json" style="display:none" onchange="impD(event)"></div><div class="sb-sc"><kbd>N</kbd> Add <kbd>/</kbd> Search <kbd>Esc</kbd> Close</div></aside>
<main id="main"><div id="vh" class="vh"></div><div id="vc" class="vc"></div></main>
<div id="mo" role="dialog" aria-modal="true"><div id="mc"></div></div>
<div id="tc" aria-live="polite"></div>
<script>
/* Category colors */
var CC={cards:"#C9A84C",comics:"#D46A3E",magazines:"#3EA5A0",books:"#A0784C",coins:"#C48B5A",cash:"#5AAA6E",vhs:"#D4567A",vinyl:"#8B6FC0",actionFigures:"#4A8ED4",electronics:"#3AB8C8",memorabilia:"#C9A040",posters:"#C44E8B",furniture:"#7A9E5A",cars:"#D44A4A"};

/* Category definitions stored as JSON string to avoid any apostrophe/quote breaking issues */

function initBg(){var c=document.getElementById("bg-canvas"),ctx=c.getContext("2d"),w,h,pts=[];function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}resize();window.addEventListener("resize",resize);for(var i=0;i<30;i++)pts.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.2+.4,dx:(Math.random()-.5)*.1,dy:(Math.random()-.5)*.1,o:Math.random()*.25+.06});(function draw(){ctx.clearRect(0,0,w,h);for(var i=0;i<pts.length;i++){var p=pts[i];p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.4,p.r),0,Math.PI*2);ctx.fillStyle="rgba(201,168,76,"+p.o+")";ctx.fill()}requestAnimationFrame(draw)})()}

function renderDash(h,c){var ti=items.length,tv=0,tc=0;for(var i=0;i<items.length;i++){tv+=parseFloat(items[i].estimatedValue)||0;tc+=parseFloat(items[i].purchasePrice)||0}var ncS={},nc=0;for(var i=0;i<items.length;i++){ncS[items[i].category]=1}nc=Object.keys(ncS).length;h.innerHTML='<h2 class="vh-title">Dashboard</h2><p class="vh-sub">Your collection at a glance \u2014 '+ti+' items across '+nc+' categories</p>';c.innerHTML='<div class="sr"><div class="sc"><div class="sc-l">Total Items</div><div class="sc-v">'+ti+'</div></div><div class="sc"><div class="sc-l">Estimated Value</div><div class="sc-v ac">'+fc(tv)+'</div></div><div class="sc"><div class="sc-l">Total Invested</div><div class="sc-v">'+fc(tc)+'</div></div><div class="sc"><div class="sc-l">Gain / Loss</div><div class="sc-v" style="color:'+(tv-tc>=0?"var(--success)":"var(--danger)")+'">'+fc(tv-tc)+'</div></div><div class="sc"><div class="sc-l">Categories</div><div class="sc-v">'+nc+'</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px"><div style="background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:22px 24px"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Collection Breakdown</h3><div class="dw"><canvas id="donut" width="170" height="170"></canvas><div id="dleg" class="donut-legend" style="flex:1"></div></div></div><div style="background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:22px 24px"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Value by Category</h3><div id="vbars"></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px"><div style="background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:22px 24px"><h3 style="font-size:15px;font-weight:700;margin-bottom:14px">Recent Additions</h3><div id="drec"></div></div><div style="background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:22px 24px"><h3 style="font-size:15px;font-weight:700;margin-bottom:14px">Most Valuable</h3><div id="dval"></div></div></div>';
var cks=Object.keys(CATS).filter(function(k){return k!=="dashboard"}),cd=cks.map(function(k){return{k:k,n:CATS[k].name,v:items.filter(function(i){return i.category===k}).length,c:CC[k]}}).filter(function(d){return d.v>0}).sort(function(a,b){return b.v-a.v}),total=Math.max(1,cd.reduce(function(s,d){return s+d.v},0));
var canvas=document.getElementById("donut"),ctx=canvas.getContext("2d"),cx=85,cy=85,or=74,ir=46;
if(!cd.length){ctx.beginPath();ctx.arc(cx,cy,or,0,Math.PI*2);ctx.arc(cx,cy,ir,0,Math.PI*2,true);ctx.fillStyle="#1F1E1C";ctx.fill();ctx.fillStyle="#5A5650";ctx.font="12px DM Sans";ctx.textAlign="center";ctx.fillText("No data",cx,cy+4)}else{var ang=-Math.PI/2;for(var i=0;i<cd.length;i++){var d=cd[i],sw=(d.v/total)*Math.PI*2;ctx.beginPath();ctx.arc(cx,cy,or,ang,ang+sw);ctx.arc(cx,cy,ir,ang+sw,ang,true);ctx.closePath();ctx.fillStyle=d.c;ctx.fill();ang+=sw}ctx.fillStyle="#EAE6DF";ctx.font="bold 20px Playfair Display";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(total,cx,cy-5);ctx.fillStyle="#5A5650";ctx.font="9px DM Sans";ctx.fillText("ITEMS",cx,cy+11)}
document.getElementById("dleg").innerHTML=cd.length?cd.map(function(d){return'<div class="dl-row"><div class="dl-dot" style="background:'+d.c+'"></div><span class="dl-name">'+d.n+'</span><span class="dl-val">'+d.v+'</span></div>'}).join(""):'<p style="color:#5A5650;font-size:13px">No items yet.</p>';
var vd=cks.map(function(k){return{k:k,n:CATS[k].name,v:items.filter(function(i){return i.category===k}).reduce(function(s,i){return s+(parseFloat(i.estimatedValue)||0)},0),c:CC[k]}}).filter(function(d){return d.v>0}).sort(function(a,b){return b.v-a.v}),mx=1;for(var i=0;i<vd.length;i++){if(vd[i].v>mx)mx=vd[i].v}
document.getElementById("vbars").innerHTML=vd.length?vd.map(function(d){return'<div class="cb-row"><span class="cb-label">'+d.n+'</span><div class="cb-track"><div class="cb-fill" style="width:'+(d.v/mx*100).toFixed(1)+'%;background:'+d.c+'">'+(d.v>=mx*.12?fc(d.v):"")+'</div></div></div>'}).join(""):'<p style="color:#5A5650;font-size:13px">No values.</p>';
var recent=items.slice().sort(function(a,b){return new Date(b.dateAdded)-new Date(a.dateAdded)}).slice(0,7);document.getElementById("drec").innerHTML=recent.length?recent.map(function(i){return'<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="showDetail(\''+i.id+'\')"><div style="width:30px;height:30px;border-radius:6px;background:'+(CC[i.category]||"#2E2B28")+'15;display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas '+(CATS[i.category]?CATS[i.category].icon:"fa-box")+'" style="color:'+(CC[i.category]||"#5A5650")+';font-size:10px"></i></div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(i.name)+'</div><div style="font-size:10px;color:#5A5650">'+(CATS[i.category]?CATS[i.category].name:"")+'</div></div><div style="font-size:11px;color:var(--accent);font-weight:600;flex-shrink:0">'+fc(i.estimatedValue)+'</div></div>'}).join(""):'<p style="color:#5A5650;font-size:13px">Nothing yet.</p>';
var val=items.slice().sort(function(a,b){return(parseFloat(b.estimatedValue)||0)-(parseFloat(a.estimatedValue)||0)}).slice(0,7);document.getElementById("dval").innerHTML=val.length?val.map(function(i){return'<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="showDetail(\''+i.id+'\')"><div style="width:30px;height:30px;border-radius:6px;background:'+(CC[i.category]||"#2E2B28")+'15;display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas '+(CATS[i.category]?CATS[i.category].icon:"fa-box")+'" style="color:'+(CC[i.category]||"#5A5650")+';font-size:10px"></i></div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(i.name)+'</div><div style="font-size:10px;color:#5A5650">'+(CATS[i.category]?CATS[i.category].name:"")+'</div></div><div style="font-size:11px;color:var(--accent);font-weight:700;flex-shrink:0">'+fc(i.estimatedValue)+'</div></div>'}).join(""):'<p style="color:#5A5650;font-size:13px">No values.</p>'}

/* Category view */
function renderCat(h,c,ck){var cat=CATS[ck],col=CC[ck]||"var(--accent)",filt=getFiltered(ck),allC=getItems(ck),tv=0;for(var i=0;i<filt.length;i++)tv+=parseFloat(filt[i].estimatedValue)||0;var avg=filt.length?(tv/filt.length):0;var sgS={},sgArr=[];for(var i=0;i<allC.length;i++){if(allC[i].subGenre&&!sgS[allC[i].subGenre]){sgS[allC[i].subGenre]=1;sgArr.push(allC[i].subGenre)}}sgArr.sort();
h.innerHTML='<div class="vh-cat" style="color:'+col+'"><i class="fas '+cat.icon+'"></i> '+cat.name+'</div><h2 class="vh-title">'+cat.name+'</h2><p class="vh-sub">'+filt.length+' item'+(filt.length!==1?"s":"")+' \u00b7 Total: '+fc(tv)+(filt.length>1?" \u00b7 Avg: "+fc(avg):"")+'</p><div class="vh-acts"><button class="btn-p" onclick="openAdd(\''+ck+'\')"><i class="fas fa-plus"></i> Add Item</button><select class="ssel" onchange="handleSort(this.value)"><option value="dateAdded-desc"'+(sf==="dateAdded"&&sd==="desc"?" selected":"")+'>Newest First</option><option value="dateAdded-asc"'+(sf==="dateAdded"&&sd==="asc"?" selected":"")+'>Oldest First</option><option value="name-asc"'+(sf==="name"&&sd==="asc"?" selected":"")+'>Name A\u2013Z</option><option value="name-desc"'+(sf==="name"&&sd==="desc"?" selected":"")+'>Name Z\u2013A</option><option value="estimatedValue-desc"'+(sf==="estimatedValue"&&sd==="desc"?" selected":"")+'>Highest Value</option><option value="estimatedValue-asc"'+(sf==="estimatedValue"&&sd==="asc"?" selected":"")+'>Lowest Value</option><option value="purchasePrice-desc"'+(sf==="purchasePrice"&&sd==="desc"?" selected":"")+'>Highest Cost</option><option value="purchasePrice-asc"'+(sf==="purchasePrice"&&sd==="asc"?" selected":"")+'>Lowest Cost</option></select><div class="sbox"><i class="fas fa-search"></i><input type="text" placeholder="Search '+cat.name.toLowerCase()+'..." value="'+esc(sq)+'" oninput="handleSearch(this.value)"></div></div>'+(sgArr.length>1?'<div class="fchips">'+(activeFilter?'<span class="fc" onclick="clearFilter()"><i class="fas fa-times" style="margin-right:4px;font-size:9px"></i> Clear</span>':'')+sgArr.map(function(s){return'<span class="fc'+(activeFilter===s?' active':'')+'" onclick="setFilter(\''+esc(s).replace(/'/g,"\\'")+'\')">'+esc(s)+'</span>'}).join('')+'</div>':'');
if(!filt.length){c.innerHTML='<div class="empty"><i class="fas '+cat.icon+'"></i><h3>'+(sq?'No matches':'No items yet')+'</h3><p>'+(sq?'Try a different search term.':'Start building your collection.')+'</p>'+( !sq?'<button class="btn-p" style="margin-top:18px" onclick="openAdd(\''+ck+'\')"><i class="fas fa-plus"></i> Add First Item</button>':'')+'</div>';return}
c.innerHTML='<div class="ig">'+filt.map(function(i,idx){return renderCard(i,cat,col,idx)}).join('')+'</div>'}

function renderCard(item,cat,col,idx){var imgH=item.image?'<img src="'+esc(item.image)+'" alt="" loading="lazy" onerror="this.parentElement.innerHTML=\'<i class=\\\'fas '+cat.icon+' ph\\\'></i>\'">':'<i class="fas '+cat.icon+' ph"></i>';var tags=[];if(item.subGenre)tags.push({t:item.subGenre,p:false});if(item.year)tags.push({t:String(item.year),p:true});if(item.condition)tags.push({t:item.condition.split("(")[0].trim(),p:true});var ex=item.make?"make":item.artist?"artist":item.author?"author":item.designer?"designer":"";if(ex&&item[ex])tags.push({t:item[ex]+(item.model?" "+item.model:""),p:true});return'<article class="ic" style="animation-delay:'+Math.min(idx*50,500)+'ms" onclick="showDetail(\''+item.id+'\')" tabindex="0"><div class="ic-img">'+imgH+'<div class="ct2" style="background:linear-gradient(135deg,'+col+',transparent)"></div></div><div class="ic-body"><div class="ic-name">'+esc(item.name)+'</div><div class="ic-tags">'+tags.slice(0,3).map(function(t,i){return'<span class="ic-tag'+(i===0?" p":" d")+'" '+(i===0?'style="background:'+col+'18;color:'+col+'"':'')+'>'+esc(t.t)+'</span>'}).join('')+'</div><div class="ic-foot"><span class="ic-price" style="color:'+col+'">'+fc(item.estimatedValue)+'</span><span class="ic-date">'+new Date(item.dateAdded).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</span></div></div></article>'}

/* Detail */
function showDetail(id){var item=items.filter(function(i){return i.id===id})[0];if(!item)return;var cat=CATS[item.category];if(!cat)return;var col=CC[item.category]||"var(--accent)";var imgH=item.image?'<img src="'+esc(item.image)+'" alt="" onerror="this.parentElement.innerHTML=\'<i class=\\\'fas '+cat.icon+' ph\\\'></i>\'">':'<i class="fas '+cat.icon+' ph"></i>';var allF=cat.fields.concat(cFields(cat)).filter(function(f){return f.key!=='name'&&item[f.key]});var fH=allF.map(function(f){var v=item[f.key];if(f.key==='purchasePrice'||f.key==='estimatedValue')v=fc(v);else v=esc(String(v));return'<div><div class="dfl">'+f.label+'</div><div class="dfv'+(f.key==='estimatedValue'?' ac':'')+'">'+v+'</div></div>'}).join('');openM('<div class="mh"><h3 class="mt">Item Details</h3><button class="mx" onclick="closeM()"><i class="fas fa-times"></i></button></div><div class="mbody"><div class="d-hero">'+imgH+'<div class="co2" style="background:linear-gradient(180deg,'+col+'30,transparent 60%)"></div></div><span style="font-size:10.5px;padding:3px 10px;border-radius:4px;background:'+col+'18;color:'+col+';font-weight:600;display:inline-block;margin-bottom:6px">'+cat.name+'</span><h2 class="d-name">'+esc(item.name)+'</h2><div class="d-sub">Added '+new Date(item.dateAdded).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+'</div><div class="dg">'+fH+'</div>'+(item.notes?'<div class="d-notes"><strong style="color:var(--fg);font-size:11px;text-transform:uppercase;letter-spacing:.7px">Notes</strong><br>'+esc(item.notes)+'</div>':'')+'<div class="d-acts"><button class="btn-s" onclick="openEdit(\''+item.id+'\')"><i class="fas fa-pen"></i> Edit</button><button class="btn-s" onclick="dupItem(\''+item.id+'\')"><i class="fas fa-copy"></i> Duplicate</button><button class="btn-d" onclick="confirmDel(\''+item.id+'\')"><i class="fas fa-trash-alt"></i> Delete</button></div></div>')}

function dupItem(id){var item=items.filter(function(i){return i.id===id})[0];if(!item)return;var dup=JSON.parse(JSON.stringify(item));dup.id=gid();dup.dateAdded=new Date().toISOString();dup.name=item.name+' (Copy)';items.push(dup);save();closeM();toast('Item duplicated.');renderSB();renderView()}

/* Form */
function openAdd(ck){editId=null;renderForm(ck,null)}
function openEdit(id){var item=items.filter(function(i){return i.id===id})[0];if(!item)return;editId=id;closeM();setTimeout(function(){renderForm(item.category,item)},200)}
function renderForm(ck,item){var cat=CATS[ck],isE=!!item,col=CC[ck]||"var(--accent)",secs=[{t:'Item Information',f:cat.fields},{t:'Condition, Value & Media',f:cFields(cat)}];var html='';for(var s=0;s<secs.length;s++){html+='<div class="fs-t">'+secs[s].t+'</div><div class="fg">';var flds=secs[s].f;for(var f=0;f<flds.length;f++){var fi=flds[f],v=item?(item[fi.key]||''):'',rq=fi.required?' <span class="rq">*</span>':'',full=(fi.type==='textarea'||fi.key==='image'||fi.key==='notes'||fi.key==='accessories'||fi.key==='includes'||fi.key==='coa'||fi.key==='modifications'||fi.key==='cosmeticNotes'||fi.key==='provenance')?' full':'';
if(fi.type==='image'){html+='<div class="fgi'+full+'"><label class="fl">'+fi.label+rq+'</label><div class="img-dz" id="dz-'+fi.key+'" ondragover="event.preventDefault();this.classList.add(\'dragover\')" ondragleave="this.classList.remove(\'dragover\')" ondrop="handleDrop(event,\''+fi.key+'\')"><input type="file" accept="image/*" onchange="handleFilePick(event,\''+fi.key+'\')"><div class="dz-t" id="dzt-'+fi.key+'"><i class="fas fa-cloud-upload-alt"></i>Drop image or click to browse</div>'+(v?'<img class="dz-p" src="'+esc(v)+'" id="dzp-'+fi.key+'" alt="">':'')+'</div><input type="hidden" id="field-'+fi.key+'" data-key="'+fi.key+'" value="'+esc(v)+'"></div>'}
else if(fi.type==='subGenre'){html+='<div class="fgi'+full+'"><label class="fl">'+fi.label+rq+'</label>'+renderSG(cat.subGenres,v)+'</div>'}
else if(fi.type==='select'){html+='<div class="fgi'+full+'"><label class="fl">'+fi.label+rq+'</label><select class="fsel" id="field-'+fi.key+'" data-key="'+fi.key+'"><option value="">Select...</option>'+fi.options.map(function(o){return'<option value="'+esc(o)+'"'+(v===o?' selected':'')+'>'+esc(o)+'</option>'}).join('')+'</select></div>'}
else if(fi.type==='textarea'){html+='<div class="fgi'+full+'"><label class="fl">'+fi.label+rq+'</label><textarea class="fta" id="field-'+fi.key+'" data-key="'+fi.key+'" placeholder="'+(fi.placeholder||'')+'">'+esc(v)+'</textarea></div>'}
else{html+='<div class="fgi'+full+'"><label class="fl">'+fi.label+rq+'</label><input class="fi" type="'+(fi.type||'text')+'" id="field-'+fi.key+'" data-key="'+fi.key+'" value="'+esc(v)+'" placeholder="'+(fi.placeholder||'')+'" '+(fi.required?'required':'')+'></div>'}}
html+='</div>'}
openM('<div class="mh"><h3 class="mt" style="color:'+col+'">'+(isE?'Edit Item':'Add New Item')+' \u2014 '+cat.name+'</h3><button class="mx" onclick="closeM()"><i class="fas fa-times"></i></button></div><div class="mbody"><form id="ifrm" onsubmit="submitForm(event,\''+ck+'\')">'+html+'<div class="fa"><button type="button" class="btn-s" onclick="closeM()">Cancel</button><button type="submit" class="btn-p"><i class="fas fa-check"></i> '+(isE?'Save Changes':'Add Item')+'</button></div></form></div>')}

function renderSG(groups,sel){if(!groups)return'<input class="fi" type="text" placeholder="N/A">';var h='<select class="fsel" id="field-subGenre" data-key="subGenre"><option value="">Select sub-genre...</option>';var gk=Object.keys(groups);for(var g=0;g<gk.length;g++){h+='<optgroup label="'+esc(gk[g])+'">';var opts=groups[gk[g]];for(var o=0;o<opts.length;o++)h+='<option value="'+esc(opts[o])+'"'+(sel===opts[o]?' selected':'')+'>'+esc(opts[o])+'</option>';h+='</optgroup>'}return h+'</select>'}

function handleFilePick(e,k){var f=e.target.files[0];if(f)processImg(f,k)}
function handleDrop(e,k){e.preventDefault();e.currentTarget.classList.remove('dragover');var f=e.dataTransfer.files[0];if(f&&f.type.indexOf('image')===0)processImg(f,k)}
function processImg(file,key){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var mx=600,w=img.width,h=img.height;if(w>mx){h=Math.round(h*(mx/w));w=mx}var cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);var d=cv.toDataURL('image/jpeg',.8);document.getElementById('field-'+key).value=d;var p=document.getElementById('dzp-'+key);if(p)p.src=d;else{var dz=document.getElementById('dz-'+key),el=document.createElement('img');el.className='dz-p';el.src=d;el.id='dzp-'+key;dz.appendChild(el)}document.getElementById('dzt-'+key).style.display='none'};img.src=e.target.result};r.readAsDataURL(file)}

function submitForm(e,ck){e.preventDefault();var form=document.getElementById('ifrm'),data={};var inputs=form.querySelectorAll('[data-key]');for(var i=0;i<inputs.length;i++){var el=inputs[i];data[el.dataset.key]=el.type==='number'?(el.value===''?'':el.value):el.value.trim()}if(CATS[ck].fields.filter(function(f){return f.key==='name'&&f.required}).length&&!data.name){toast('Please enter an item name.','error');return}if(editId){for(var i=0;i<items.length;i++){if(items[i].id===editId){for(var k in data)items[i][k]=data[k];break}}save();toast('Item updated.')}else{items.push(Object.assign({id:gid(),category:ck,dateAdded:new Date().toISOString()},data));save();toast('Item added to collection.')}editId=null;closeM();renderSB();renderView()}

function confirmDel(id){var item=items.filter(function(i){return i.id===id})[0];if(!item)return;openM('<div class="cf-box"><i class="fas fa-exclamation-triangle"></i><h3>Delete Item</h3><p>Remove <strong>'+esc(item.name)+'</strong>? This cannot be undone.</p><div class="cf-acts"><button class="btn-s" onclick="closeM()">Cancel</button><button class="btn-d" style="margin-left:0" onclick="delItem(\''+id+'\')"><i class="fas fa-trash-alt"></i> Delete</button></div></div>')}
function delItem(id){items=items.filter(function(i){return i.id!==id});save();closeM();toast('Item removed.','info');renderSB();renderView()}

function openM(html){document.getElementById('mc').innerHTML=html;document.getElementById('mo').classList.add('open');document.body.style.overflow='hidden'}
function closeM(){document.getElementById('mo').classList.remove('open');document.body.style.overflow='';editId=null}
function setFilter(v){activeFilter=v;renderView()}
function clearFilter(){activeFilter=null;renderView()}
function handleSearch(v){sq=v;renderView()}
function handleSort(v){var p=v.split('-');sf=p[0];sd=p[1];renderView()}
function expD(){var b=new Blob([JSON.stringify(items,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='vault-'+new Date().toISOString().split('T')[0]+'.json';a.click();URL.revokeObjectURL(a.href);toast('Collection exported.')}
function impD(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var imp=JSON.parse(ev.target.result);if(!Array.isArray(imp))throw new Error('Invalid');var valid=imp.filter(function(i){return i.id&&i.category&&i.name&&CATS[i.category]});if(!valid.length)throw new Error('No valid items');var ids={};for(var i=0;i<items.length;i++)ids[items[i].id]=1;var n=0;for(var j=0;j<valid.length;j++){if(!ids[valid[j].id]){items.push(valid[j]);n++}}save();renderSB();renderView();toast('Imported '+n+' item'+(n!==1?'s':'')+'.')}catch(err){toast('Import failed: '+err.message,'error')}};r.readAsText(f);e.target.value=''}

/* Event delegation */
document.getElementById('sb-nav').addEventListener('click',function(e){var btn=e.target.closest('.sb-btn');if(!btn)return;var ck=btn.dataset.cat;if(!ck)return;curView=ck;sq='';sf='dateAdded';sd='desc';activeFilter=null;renderSB();renderView();document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-bd').classList.remove('show')});
document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)closeM()});
document.getElementById('ham').addEventListener('click',function(){var sb=document.getElementById('sidebar'),bd=document.getElementById('sb-bd'),op=sb.classList.toggle('open');bd.classList.toggle('show',op)});
document.getElementById('sb-bd').addEventListener('click',function(){document.getElementById('sidebar').classList.remove('open');this.classList.remove('show')});
document.addEventListener('keydown',function(e){if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;if(e.key==='Escape')closeM();if(e.key==='/'){e.preventDefault();var inp=document.querySelector('.sbox input');if(inp){inp.focus();inp.select()}}if((e.key==='n'||e.key==='N')&&curView!=='dashboard'&&curView){e.preventDefault();openAdd(curView)}});
document.getElementById('vc').addEventListener('keydown',function(e){if(e.key==='Enter'&&e.target.classList.contains('ic'))e.target.click()});

/* Init */
load();initBg();renderSB();renderView();
</script>
