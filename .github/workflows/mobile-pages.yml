name: WolfeVault Mobile PWA

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/mobile-pages.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/mobile-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: mobile-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install workspace dependencies
        run: npm ci --no-audit --no-fund
      - name: Install Linux native bindings
        run: npm install --no-save @rollup/rollup-linux-x64-gnu @esbuild/linux-x64
      - name: Test mobile PWA
        run: npm run test --workspace @vault/mobile
      - name: Build mobile PWA
        run: npm run build:pwa --workspace @vault/mobile
      - name: Configure GitHub Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5
      - name: Upload PWA artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/mobile/dist

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
