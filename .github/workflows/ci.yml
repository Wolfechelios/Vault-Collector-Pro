name: Vault CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install workspace dependencies
        run: npm install --no-audit --no-fund
      - name: Test desktop
        run: npm run test --workspace @vault/desktop
      - name: Test capture intelligence
        run: npm run test --workspace @vault/capture
      - name: Test marketplace intelligence
        run: npm run test --workspace @vault/marketplace
      - name: Test domain
        run: npm run test --workspace @vault/domain
      - name: Test storage
        run: npm run test --workspace @vault/storage
      - name: Test importer
        run: npm run test --workspace @vault/importer
      - name: Test backup
        run: npm run test --workspace @vault/backup
      - name: Test vision
        run: npm run test --workspace @vault/vision
      - name: Test pricing
        run: npm run test --workspace @vault/pricing
      - name: Test integrated inventory intelligence
        run: |
          npm run test --workspace @vault/inventory-intelligence
          npm run test --workspace @vault/learning
          npm run test --workspace @vault/search
      - name: Build desktop and mobile applications
        id: production_build
        shell: bash
        run: |
          set +e
          npm run build > build-output.txt 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload production build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-build-output
          path: build-output.txt
          if-no-files-found: error
          retention-days: 3
      - name: Enforce production build result
        if: steps.production_build.outputs.exit_code != '0'
        run: |
          cat build-output.txt
          exit 1

  rust:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install workspace dependencies
        run: npm install --no-audit --no-fund
      - name: Test Tauri Rust backend
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

  mobile:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install --no-audit --no-fund
      - name: Test mobile intelligence
        run: npm run test --workspace @vault/mobile
      - name: Build mobile production application
        run: npm run build --workspace @vault/mobile

  tauri-e2e:
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    env:
      XDG_DATA_HOME: ${{ github.workspace }}/.e2e-data
      VITE_E2E: "1"
      VAULT_TAURI_BINARY: ${{ github.workspace }}/apps/desktop/src-tauri/target/debug/vault-catalogue
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install native Tauri and WebDriver dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev webkit2gtk-driver libappindicator3-dev librsvg2-dev patchelf xvfb
          cargo install tauri-driver --locked
      - name: Install workspace and Linux Tauri CLI binding
        run: |
          npm install --no-audit --no-fund
          npm install --no-save @tauri-apps/cli-linux-x64-gnu @rollup/rollup-linux-x64-gnu @esbuild/linux-x64
      - name: Build real Tauri test application
        run: npm run tauri --workspace @vault/desktop -- build --debug
      - name: Run native WebDriver scenarios
        run: xvfb-run -a npm run test:e2e --workspace @vault/desktop
      - name: Upload native E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-e2e-diagnostics
          path: |
            apps/desktop/e2e/artifacts
            .e2e-data
          if-no-files-found: warn
          retention-days: 5
