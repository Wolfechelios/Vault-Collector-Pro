name: Vault CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install workspace dependencies
        run: npm install --no-audit --no-fund
      - name: Run frontend and package tests
        run: npm test
      - name: Build desktop and mobile applications
        run: npm run build

  rust:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install workspace dependencies
        run: npm install --no-audit --no-fund
      - name: Test Tauri Rust backend
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml
