name: Vault CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install workspace dependencies
        run: npm install --no-audit --no-fund
      - name: Test desktop
        run: npm run test --workspace @vault/desktop
      - name: Test capture intelligence
        run: npm run test --workspace @vault/capture
      - name: Test marketplace intelligence
        run: npm run test --workspace @vault/marketplace
      - name: Test domain
        run: npm run test --workspace @vault/domain
      - name: Test storage
        run: npm run test --workspace @vault/storage
      - name: Test importer
        run: npm run test --workspace @vault/importer
      - name: Test backup
        run: npm run test --workspace @vault/backup
      - name: Test vision
        run: npm run test --workspace @vault/vision
      - name: Test pricing
        run: npm run test --workspace @vault/pricing
      - name: Test integrated inventory intelligence
        run: |
          npm run test --workspace @vault/inventory-intelligence
          npm run test --workspace @vault/learning
          npm run test --workspace @vault/search
      - name: Build desktop and mobile applications
        id: production_build
        shell: bash
        run: |
          set +e
          npm run build > build-output.txt 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload production build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-build-output
          path: build-output.txt
          if-no-files-found: error
          retention-days: 3
      - name: Enforce production build result
        if: steps.production_build.outputs.exit_code != '0'
        run: |
          cat build-output.txt
          exit 1

  rust:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install workspace dependencies
        run: npm install --no-audit --no-fund
      - name: Test Tauri Rust backend
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml
